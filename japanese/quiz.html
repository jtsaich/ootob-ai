<style>
  :root {
    --bg: #fafaf8;
    --surface: #fff;
    --card: #f0eeea;
    --accent: #1a1a1a;
    --accent2: #555;
    --text: #1a1a1a;
    --text-muted: #555;
    --correct: #2e7d32;
    --wrong: #c62828;
    --border: #e0ddd8;
    --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 600px;
    width: 100%;
    padding: 20px;
  }
  header {
    text-align: center;
    padding: 30px 0 20px;
  }
  header h1 { font-size: 1.6em; margin-bottom: 6px; text-wrap: balance; }
  header .subtitle { color: var(--text-muted); font-size: 0.9em; }
  .stats-bar {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px 16px;
    padding: 12px 0;
    margin-bottom: 16px;
    font-size: 0.85em;
    color: var(--text-muted);
  }
  .stats-bar span strong { color: var(--text); font-variant-numeric: tabular-nums; }

  /* Mode selector */
  .mode-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .mode-btn {
    flex: 1;
    min-width: 100px;
    padding: 12px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 0.85em;
    cursor: pointer;
    transition: border-color 0.2s ease, color 0.2s ease, background-color 0.2s ease;
    text-align: center;
  }
  .mode-btn.active {
    border-color: var(--accent);
    color: var(--text);
    background: var(--card);
  }

  /* Level filter */
  .level-filter {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    justify-content: center;
  }
  .level-btn {
    padding: 6px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-muted);
    font-size: 0.8em;
    cursor: pointer;
    transition: border-color 0.2s ease, color 0.2s ease, background-color 0.2s ease;
  }
  .level-btn.active {
    border-color: var(--accent);
    color: var(--text);
    background: var(--card);
  }

  /* Quiz card */
  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 20px;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
  }
  .quiz-card .level-tag {
    position: absolute;
    top: 12px;
    right: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 0.7em;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--card);
    color: var(--text-muted);
  }
  .quiz-card .prompt-label {
    font-size: 0.8em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .quiz-card .prompt {
    font-size: 2.2em;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .quiz-card .prompt-sub {
    font-size: 1em;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .quiz-card .qa-context {
    font-size: 0.85em;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-style: italic;
  }

  /* Input area */
  .input-area {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .input-area input {
    flex: 1;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-size: 1.1em;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-area input:focus { border-color: var(--accent); }
  .input-area input.correct { border-color: var(--correct); }
  .input-area input.wrong { border-color: var(--wrong); }
  .submit-btn {
    padding: 14px 24px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: var(--bg);
    font-size: 1em;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  /* Result feedback */
  .feedback {
    text-align: center;
    padding: 16px;
    border-radius: var(--radius);
    margin-bottom: 16px;
    display: none;
    font-size: 0.95em;
    line-height: 1.6;
  }
  .feedback.show { display: block; }
  .feedback.correct {
    background: rgba(46,125,50,0.06);
    border: 1px solid var(--correct);
    color: var(--correct);
  }
  .feedback.wrong {
    background: rgba(198,40,40,0.06);
    border: 1px solid var(--wrong);
    color: var(--wrong);
  }
  .feedback .answer-detail {
    color: var(--text);
    margin-top: 8px;
  }

  /* Action buttons */
  .actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .action-btn {
    padding: 10px 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--text-muted);
    font-size: 0.85em;
    cursor: pointer;
    transition: border-color 0.2s ease, color 0.2s ease;
  }
  .action-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }

  /* Rating buttons (FSRS) */
  .rating-bar {
    display: none;
    gap: 8px;
    margin-bottom: 16px;
  }
  .rating-bar.show { display: flex; }
  .rating-btn {
    flex: 1;
    padding: 10px 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-size: 0.85em;
    cursor: pointer;
    transition: border-color 0.2s ease, background-color 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .rating-btn.suggested {
    border-color: var(--accent);
    background: var(--card);
  }
  .rating-btn .label { font-weight: 600; font-family: 'Inter', sans-serif; }
  .rating-btn .interval {
    font-size: 0.7em;
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
  }
  .rating-btn.again .label { color: #c62828; }
  .rating-btn.hard  .label { color: #ef6c00; }
  .rating-btn.good  .label { color: #2e7d32; }
  .rating-btn.easy  .label { color: #1565c0; }
  .rating-btn.again.suggested { border-color: #c62828; background: rgba(198,40,40,0.06); }
  .rating-btn.hard.suggested  { border-color: #ef6c00; background: rgba(239,108,0,0.06); }
  .rating-btn.good.suggested  { border-color: #2e7d32; background: rgba(46,125,50,0.06); }
  .rating-btn.easy.suggested  { border-color: #1565c0; background: rgba(21,101,192,0.06); }

  /* Q&A specific */
  .qa-hint {
    font-size: 0.8em;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 12px;
  }
  .qa-example {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 12px;
    font-size: 0.9em;
    line-height: 1.8;
    text-align: left;
  }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
    border-radius: 2px;
  }

  /* Vocab browser */
  .vocab-browser { display: none; }
  .vocab-browser.show { display: block; }
  .vocab-search {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-size: 0.95em;
    outline: none;
    margin-bottom: 12px;
  }
  .vocab-list {
    max-height: 60vh;
    overflow-y: auto;
    border-radius: var(--radius);
  }
  .vocab-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 0.9em;
  }
  .vocab-item .jp { font-size: 1.1em; }
  .vocab-item .reading { color: var(--text-muted); font-size: 0.85em; }
  .vocab-item .zh { color: var(--text-muted); }
  .vocab-item .lvl {
    font-size: 0.7em;
    padding: 2px 6px;
    border-radius: 8px;
    background: var(--card);
    color: var(--text-muted);
    margin-left: 8px;
  }
  .mastery-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .dot-gray { background: #ccc; }
  .dot-red { background: #c62828; }
  .dot-yellow { background: #f9a825; }
  .dot-green { background: #2e7d32; }
  .vocab-count {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.8em;
    margin-bottom: 12px;
  }

  /* Tab bar */
  .tab-bar {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    padding: 12px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 0.9em;
    cursor: pointer;
    transition: color 0.2s ease, border-color 0.2s ease;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    font-weight: 700;
  }
  .tab-btn.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  /* Page load animation */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  header { animation: fadeInUp 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
  #quizSection, #vocabSection { animation: fadeInUp 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.08s both; }

  /* Button press feedback */
  .submit-btn:active, .action-btn:active, .mode-btn:active, .level-btn:active {
    transform: scale(0.97);
  }

  /* Feedback slide-in */
  .feedback.show {
    animation: fadeInUp 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
  }

  /* Hover only on pointer devices */
  @media (hover: hover) and (pointer: fine) {
    .mode-btn:hover { border-color: var(--accent2); }
    .level-btn:hover { border-color: var(--accent2); }
    .action-btn:hover { border-color: var(--accent); color: var(--text); }
    .submit-btn:hover { opacity: 0.75; }
    .vocab-item:hover { background: var(--card); }
  }

  /* Accessibility */
  @media (prefers-reduced-motion: reduce) {
    header, #quizSection, #vocabSection, .feedback.show {
      animation: none;
    }
    .mode-btn, .level-btn, .action-btn, .tab-btn,
    .input-area input, .submit-btn, .progress-bar .fill {
      transition: none;
    }
    .submit-btn:active, .action-btn:active, .mode-btn:active, .level-btn:active {
      transform: none;
    }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Dojo 道場</h1>
    <div class="subtitle">N5 / N4 單字 + 會話 <span style="margin-left:8px;font-size:0.75em;cursor:pointer;color:var(--text-muted);text-decoration:underline;" onclick="if(confirm('確定要重置所有學習記錄嗎？'))srsReset()">重置記錄</span></div>
  </header>

  <div class="stats-bar">
    <span>待複習: <strong id="dueCount">0</strong></span>
    <span>新卡: <strong id="newCount">0</strong></span>
    <span>今日: <strong id="todayCount">0</strong></span>
    <span>保持率: <strong id="retention">-</strong></span>
    <span>連續: <strong id="streak">0</strong></span>
    <span>已學: <strong id="learnedCount">0</strong></span>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('quiz')">練習</button>
    <button class="tab-btn" onclick="switchTab('vocab')">單字表</button>
  </div>

  <!-- Quiz Section -->
  <div id="quizSection">
    <div class="mode-selector">
      <button class="mode-btn active" onclick="setMode('zh2jp')">中 → 日</button>
      <button class="mode-btn" onclick="setMode('jp2zh')">日 → 中</button>
      <button class="mode-btn" onclick="setMode('qa')">Q&A 會話</button>
      <button class="mode-btn" onclick="setMode('weak')">弱點複習</button>
    </div>

    <div class="level-filter">
      <button class="level-btn active" data-level="all" onclick="setLevel('all')">全部</button>
      <button class="level-btn" data-level="N5" onclick="setLevel('N5')">N5</button>
      <button class="level-btn" data-level="N4" onclick="setLevel('N4')">N4</button>
    </div>

    <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>

    <div class="quiz-card" id="quizCard">
      <div class="level-tag" id="levelTag">N5</div>
      <div class="prompt-label" id="promptLabel">請寫出日文</div>
      <div class="prompt" id="prompt">載入中...</div>
      <div class="prompt-sub" id="promptSub"></div>
      <div class="qa-context" id="qaContext" style="display:none"></div>
    </div>

    <div class="qa-hint" id="qaHint" style="display:none">用日文回答即可，不需要完美</div>

    <div class="input-area">
      <input type="text" id="answerInput" placeholder="輸入答案..." autocomplete="off">
      <button class="submit-btn" id="submitBtn" onclick="checkAnswer()">確認</button>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="rating-bar" id="ratingBar">
      <button class="rating-btn again" onclick="rateCard(1)"><span class="label">Again</span><span class="interval" id="int1">—</span></button>
      <button class="rating-btn hard" onclick="rateCard(2)"><span class="label">Hard</span><span class="interval" id="int2">—</span></button>
      <button class="rating-btn good" onclick="rateCard(3)"><span class="label">Good</span><span class="interval" id="int3">—</span></button>
      <button class="rating-btn easy" onclick="rateCard(4)"><span class="label">Easy</span><span class="interval" id="int4">—</span></button>
    </div>

    <div class="actions">
      <button class="action-btn" onclick="showAnswer()">看答案</button>
      <button class="action-btn primary" onclick="nextQuestion()" id="nextBtn">下一題</button>
    </div>
  </div>

  <!-- File picker fallback (shown if fetch fails on file:// protocol) -->
  <div id="filePicker" style="display:none; text-align:center; margin-bottom:20px;">
    <p style="color:var(--text-muted); font-size:0.85em; margin-bottom:12px;">
      直接開檔無法自動載入 .md，請選擇檔案，或用 local server 開啟：<br>
      <code style="color:var(--text); font-size:0.8em; background:var(--card); padding:2px 6px; border-radius:4px;">python3 -m http.server 8000</code>
    </p>
    <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
      <label style="padding:8px 16px; border:1px solid var(--border); border-radius:8px; cursor:pointer; color:var(--text-muted); font-size:0.85em;">
        vocab.md <input type="file" id="vocabFile" accept=".md" style="display:none" onchange="handleFileSelect()">
      </label>
      <label style="padding:8px 16px; border:1px solid var(--border); border-radius:8px; cursor:pointer; color:var(--text-muted); font-size:0.85em;">
        qa.md <input type="file" id="qaFile" accept=".md" style="display:none" onchange="handleFileSelect()">
      </label>

  <!-- Vocab Browser -->
  <div id="vocabSection" class="vocab-browser">

    <div class="vocab-count" id="vocabCount"></div>
    <div class="vocab-list" id="vocabList"></div>

  <footer style="text-align:center; margin-top:32px; padding-top:16px; border-top:1px solid var(--border); color:var(--text-muted); font-size:0.8em;">
    有想法讓 Dojo 變更好？ <a href="mailto:jack@ootob.ai?subject=Dojo%20feedback" style="color:var(--text-muted); text-decoration:underline;">寄信給 jack@ootob.ai</a>
  </footer>
</div>

<script>
// ========== PARSE MD FILES ==========
function parseVocabMd(text) {
  const lines = text.split('\n');
  const vocab = [];
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('格式')) continue;
    const parts = trimmed.split('|').map(s => s.trim());
    if (parts.length >= 5) {
      vocab.push({ kanji: parts[0], reading: parts[1], zh: parts[2], level: parts[3], pos: parts[4] });
    }
  }
  // dedupe
  const seen = new Set();
  return vocab.filter(v => {
    const key = v.kanji + v.reading;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function parseQaMd(text) {
  const lines = text.split('\n');
  const qa = [];
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('格式')) continue;
    const parts = trimmed.split('|').map(s => s.trim());
    if (parts.length >= 4) {
      qa.push({ q: parts[0], zh: parts[1], hint: parts[2], level: parts[3] });
    }
  }
  return qa;
}

// ========== DATA LOADING ==========
let VOCAB_CLEAN = [];
let QA_QUESTIONS = [];
let dataLoaded = false;

async function loadFromFetch() {
  const [vocabResp, qaResp] = await Promise.all([
    fetch('vocab.md'),
    fetch('qa.md')
  ]);
  if (!vocabResp.ok || !qaResp.ok) throw new Error('fetch failed');
  VOCAB_CLEAN = parseVocabMd(await vocabResp.text());
  QA_QUESTIONS = parseQaMd(await qaResp.text());
}

function loadFromFiles(vocabText, qaText) {
  VOCAB_CLEAN = parseVocabMd(vocabText);
  QA_QUESTIONS = parseQaMd(qaText);
  dataLoaded = true;
  document.getElementById('filePicker').style.display = 'none';
  srsLoad();
  updateStats();
  nextQuestion();
}

// File picker fallback UI (hidden by default, shown if fetch fails)
function showFilePicker() {
  document.getElementById('filePicker').style.display = 'block';
  document.getElementById('prompt').textContent = '請載入單字檔';
  document.getElementById('promptLabel').textContent = '需要 vocab.md 和 qa.md';
}

// ========== STATE ==========
let mode = 'zh2jp';
let level = 'all';
let currentQ = null;
let answered = false;
let stats = { total: 0, correct: 0, streak: 0 };
const NEW_CARDS_PER_DAY = 20;

// ========== SRS PERSISTENCE ==========
let srsData = null;
let recentKeys = [];

function srsDefault() {
  return {
    version: 1,
    items: {},
    session: { date: '', total: 0, correct: 0, streak: 0, newDone: 0 },
    fsrs: { totalRated: 0, goodRated: 0 },
  };
}

function srsLoad() {
  try {
    const raw = localStorage.getItem('jpquiz_srs');
    srsData = raw ? JSON.parse(raw) : srsDefault();
    if (!srsData.items) srsData.items = {};
    if (!srsData.session) srsData.session = { date: '', total: 0, correct: 0, streak: 0, newDone: 0 };
    if (typeof srsData.session.newDone !== 'number') srsData.session.newDone = 0;
    if (!srsData.fsrs) srsData.fsrs = { totalRated: 0, goodRated: 0 };
  } catch (e) {
    srsData = srsDefault();
  }
  // Reset session counters on new day
  const today = new Date().toISOString().slice(0, 10);
  if (srsData.session.date !== today) {
    srsData.session = { date: today, total: 0, correct: 0, streak: 0, newDone: 0 };
  }
  stats.total = srsData.session.total;
  stats.correct = srsData.session.correct;
  stats.streak = srsData.session.streak;
}

function srsSave() {
  try { localStorage.setItem('jpquiz_srs', JSON.stringify(srsData)); } catch (e) {}
}

// ========== FSRS-4.5 ==========
const FSRS = (() => {
  const w = [0.4072, 1.1829, 3.1262, 15.4722, 7.2102, 0.5316, 1.0651, 0.0234, 1.616, 0.1544, 1.0824, 1.9813, 0.0953, 0.2975, 2.2042, 0.2407, 2.9466, 0.5034, 0.6567];
  const DECAY = -0.5;
  const FACTOR = 19 / 81;
  const TARGET_R = 0.9;
  const clamp = (x, lo, hi) => Math.min(Math.max(x, lo), hi);
  const initD = (g) => clamp(w[4] - Math.exp(w[5] * (g - 1)) + 1, 1, 10);
  const initS = (g) => Math.max(w[g - 1], 0.1);
  const retrievability = (t, S) => Math.pow(1 + FACTOR * t / S, DECAY);
  const nextInterval = (S) => Math.max(Math.round(S / FACTOR * (Math.pow(TARGET_R, 1 / DECAY) - 1)), 1);
  const nextD = (D, g) => clamp(w[7] * initD(4) + (1 - w[7]) * (D - w[6] * (g - 3)), 1, 10);
  const nextSuccessS = (D, S, R, g) => {
    const hardP = g === 2 ? w[15] : 1;
    const easyB = g === 4 ? w[16] : 1;
    return S * (1 + Math.exp(w[8]) * (11 - D) * Math.pow(S, -w[9]) * (Math.exp((1 - R) * w[10]) - 1) * hardP * easyB);
  };
  const nextLapseS = (D, S, R) => w[11] * Math.pow(D, -w[12]) * (Math.pow(S + 1, w[13]) - 1) * Math.exp((1 - R) * w[14]);
  const dayMs = 86400000;

  function review(f, rating, now) {
    now = now || Date.now();
    const r = Object.assign({}, f || {});
    if (!r.state || r.state === 'new') {
      r.S = initS(rating);
      r.D = initD(rating);
      r.state = rating === 1 ? 'learning' : 'review';
    } else {
      const elapsed = r.lastReview ? Math.max((now - r.lastReview) / dayMs, 0) : 0;
      const R = retrievability(elapsed, r.S);
      r.D = nextD(r.D, rating);
      if (rating === 1) {
        r.S = nextLapseS(r.D, r.S, R);
        r.state = 'relearning';
      } else {
        r.S = nextSuccessS(r.D, r.S, R, rating);
        r.state = 'review';
      }
    }
    r.interval = nextInterval(r.S);
    r.lastReview = now;
    r.due = now + r.interval * dayMs;
    return r;
  }
  function previewIntervals(f, now) {
    return [1, 2, 3, 4].map(g => review(f, g, now).interval);
  }
  return { review, previewIntervals };
})();

function formatInterval(d) {
  if (d < 1) return '<1d';
  if (d < 30) return d + 'd';
  if (d < 365) return (d / 30).toFixed(1) + 'mo';
  return (d / 365).toFixed(1) + 'y';
}

function srsGetKey(item) {
  if (item.kanji !== undefined) return 'v:' + item.kanji + '|' + item.reading;
  return 'q:' + item.q;
}

function srsRecord(item, isCorrect) {
  const key = srsGetKey(item);
  if (!srsData.items[key]) srsData.items[key] = { c: 0, w: 0, s: 0, ts: 0 };
  const entry = srsData.items[key];
  if (isCorrect) {
    entry.c++;
    entry.s++;
  } else {
    entry.w++;
    entry.s = 0;
  }
  entry.ts = Date.now();
  srsSave();
}

function srsReset() {
  srsData = srsDefault();
  srsData.session.date = new Date().toISOString().slice(0, 10);
  srsSave();
  stats = { total: 0, correct: 0, streak: 0 };
  recentKeys = [];
  updateStats();
  nextQuestion();
}

function getWeight(item) {
  const key = srsGetKey(item);
  if (recentKeys.includes(key)) return 0.05;
  const entry = srsData.items[key];
  if (!entry) return 1.5; // unseen — slightly boosted
  return Math.max(0.1, 1.0 + (entry.w * 1.5) - (entry.s * 0.3));
}

function weightedPick(pool) {
  if (pool.length === 0) return null;
  if (pool.length === 1) return pool[0];
  const weights = pool.map(item => getWeight(item));
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) {
    r -= weights[i];
    if (r <= 0) return pool[i];
  }
  return pool[pool.length - 1];
}

// FSRS-aware queue: due cards (oldest due first) → new cards within daily quota → fallback weighted pick
function pickFSRSNext(pool) {
  if (!pool || pool.length === 0) return null;
  const now = Date.now();
  const due = [];
  const news = [];
  for (const item of pool) {
    const key = srsGetKey(item);
    const entry = srsData && srsData.items[key];
    const fsrs = entry && entry.fsrs;
    if (fsrs && fsrs.due != null) {
      if (fsrs.due <= now) due.push({ item, due: fsrs.due });
    } else {
      news.push(item);
    }
  }
  if (due.length) {
    due.sort((a, b) => a.due - b.due);
    return due[0].item;
  }
  if (news.length && srsData.session.newDone < NEW_CARDS_PER_DAY) {
    return weightedPick(news);
  }
  // No due, no new quota → fall back to existing weighted behavior over full pool
  return weightedPick(pool);
}

function countDueAndNew(pool) {
  if (!pool) return { due: 0, newLeft: 0 };
  const now = Date.now();
  let due = 0, newAvail = 0;
  for (const item of pool) {
    const entry = srsData && srsData.items[srsGetKey(item)];
    const fsrs = entry && entry.fsrs;
    if (fsrs && fsrs.due != null) {
      if (fsrs.due <= now) due++;
    } else {
      newAvail++;
    }
  }
  const quotaLeft = Math.max(0, NEW_CARDS_PER_DAY - (srsData ? srsData.session.newDone : 0));
  return { due, newLeft: Math.min(newAvail, quotaLeft) };
}

// ========== HELPERS ==========
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getFilteredVocab() {
  if (level === 'all') return VOCAB_CLEAN;
  return VOCAB_CLEAN.filter(v => v.level === level);
}

function getFilteredQA() {
  if (level === 'all') return QA_QUESTIONS;
  return QA_QUESTIONS.filter(q => q.level === level);
}

function normalize(s) {
  return s.trim().replace(/\s+/g, '').toLowerCase();
}

// ========== QUIZ LOGIC ==========
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['zh2jp','jp2zh','qa','weak'][i] === m);
  });
  document.getElementById('qaHint').style.display = m === 'qa' ? 'block' : 'none';
  resetFeedback();
  nextQuestion();
}

function setLevel(l) {
  level = l;
  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.level === l);
  });
  resetFeedback();
  nextQuestion();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === (tab === 'quiz' ? 0 : 1));
  });
  document.getElementById('quizSection').style.display = tab === 'quiz' ? 'block' : 'none';
  const vb = document.getElementById('vocabSection');
  vb.classList.toggle('show', tab === 'vocab');
  if (tab === 'vocab') renderVocabList();
}

function nextQuestion() {
  answered = false;
  resetFeedback();
  const input = document.getElementById('answerInput');
  input.value = '';
  input.className = '';
  input.focus();
  document.getElementById('submitBtn').textContent = '確認';

  if (mode === 'weak') {
    // Weak point review: only vocab items answered wrong before
    const pool = VOCAB_CLEAN.filter(v => {
      const entry = srsData.items[srsGetKey(v)];
      return entry && entry.w > 0;
    });
    if (pool.length === 0) {
      currentQ = null;
      document.getElementById('levelTag').textContent = '';
      document.getElementById('promptLabel').textContent = '';
      document.getElementById('prompt').textContent = '沒有弱點單字，繼續加油！';
      document.getElementById('promptSub').textContent = '';
      document.getElementById('qaContext').style.display = 'none';
      return;
    }
    currentQ = weightedPick(pool);
    recentKeys.push(srsGetKey(currentQ));
    if (recentKeys.length > 3) recentKeys.shift();
    document.getElementById('levelTag').textContent = currentQ.level;
    document.getElementById('promptLabel').textContent = '弱點複習：請寫出日文';
    document.getElementById('prompt').textContent = currentQ.zh;
    document.getElementById('promptSub').textContent = '';
    document.getElementById('qaContext').style.display = 'none';
    input.placeholder = '輸入日文...';
  } else if (mode === 'qa') {
    const pool = getFilteredQA();
    currentQ = pickFSRSNext(pool);
    recentKeys.push(srsGetKey(currentQ));
    if (recentKeys.length > 3) recentKeys.shift();
    document.getElementById('levelTag').textContent = currentQ.level;
    document.getElementById('promptLabel').textContent = '用日文回答這個問題';
    document.getElementById('prompt').textContent = currentQ.q;
    document.getElementById('promptSub').textContent = currentQ.zh;
    document.getElementById('qaContext').style.display = 'none';
    input.placeholder = '用日文回答...';
  } else {
    const pool = getFilteredVocab();
    currentQ = pickFSRSNext(pool);
    recentKeys.push(srsGetKey(currentQ));
    if (recentKeys.length > 3) recentKeys.shift();
    document.getElementById('levelTag').textContent = currentQ.level;

    if (mode === 'zh2jp') {
      document.getElementById('promptLabel').textContent = '請寫出日文（漢字或假名）';
      document.getElementById('prompt').textContent = currentQ.zh;
      document.getElementById('promptSub').textContent = '';
      input.placeholder = '輸入日文...';
    } else {
      document.getElementById('promptLabel').textContent = '請寫出中文意思';
      document.getElementById('prompt').textContent = currentQ.kanji;
      document.getElementById('promptSub').textContent = currentQ.reading;
      input.placeholder = '輸入中文...';
    }
    document.getElementById('qaContext').style.display = 'none';
  }

  updateProgress();
}

function checkAnswer() {
  if (!currentQ) return;
  if (answered) { nextQuestion(); return; }

  const input = document.getElementById('answerInput');
  const userAns = normalize(input.value);
  if (!userAns) return;

  answered = true;
  stats.total++;

  let answerCorrect = true;
  if (mode === 'qa') {
    // Q&A mode: always show hint, no strict right/wrong
    const fb = document.getElementById('feedback');
    fb.className = 'feedback show correct';
    fb.innerHTML = `
      <div>你的回答：${input.value}</div>
      <div class="answer-detail" style="margin-top:12px">
        <strong>參考回答：</strong>${currentQ.hint}
      </div>
    `;
    stats.correct++;
    stats.streak++;
    input.classList.add('correct');
    srsRecord(currentQ, true);
  } else if (mode === 'zh2jp' || mode === 'weak') {
    const answers = [normalize(currentQ.kanji), normalize(currentQ.reading)];
    answerCorrect = answers.includes(userAns);
    showVocabFeedback(answerCorrect, `${currentQ.kanji}（${currentQ.reading}）`);
    srsRecord(currentQ, answerCorrect);
  } else {
    // jp2zh: check if any part of zh matches
    const zhParts = currentQ.zh.split(/[\/\(\)（）]/).map(normalize);
    answerCorrect = zhParts.some(p => p && (userAns.includes(p) || p.includes(userAns)));
    showVocabFeedback(answerCorrect, currentQ.zh);
    srsRecord(currentQ, answerCorrect);
  }

  document.getElementById('submitBtn').textContent = '下一題';
  updateStats();
  showRatingBar(answerCorrect ? 3 : 1);
}

function showVocabFeedback(isCorrect, correctAnswer) {
  const input = document.getElementById('answerInput');
  const fb = document.getElementById('feedback');
  if (isCorrect) {
    fb.className = 'feedback show correct';
    fb.innerHTML = `正解！`;
    input.classList.add('correct');
    stats.correct++;
    stats.streak++;
  } else {
    fb.className = 'feedback show wrong';
    fb.innerHTML = `<div>不對喔</div><div class="answer-detail">正確答案：${correctAnswer}</div>`;
    input.classList.add('wrong');
    stats.streak = 0;
  }
}

function showAnswer() {
  if (!currentQ || answered) return;
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show wrong';
  if (mode === 'qa') {
    fb.innerHTML = `<div class="answer-detail"><strong>參考回答：</strong>${currentQ.hint}</div>`;
  } else if (mode === 'zh2jp' || mode === 'weak') {
    fb.innerHTML = `<div class="answer-detail">答案：${currentQ.kanji}（${currentQ.reading}）</div>`;
  } else {
    fb.innerHTML = `<div class="answer-detail">答案：${currentQ.zh}</div>`;
  }
  answered = true;
  stats.total++;
  stats.streak = 0;
  srsRecord(currentQ, false);
  document.getElementById('submitBtn').textContent = '下一題';
  updateStats();
  showRatingBar(1);
}

function resetFeedback() {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';
  hideRatingBar();
}

function showRatingBar(suggested) {
  if (!currentQ) return;
  const key = srsGetKey(currentQ);
  const entry = srsData && srsData.items[key];
  const fsrs = (entry && entry.fsrs) || null;
  const intervals = FSRS.previewIntervals(fsrs);
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById('int' + (i + 1));
    if (el) el.textContent = formatInterval(intervals[i]);
  }
  const bar = document.getElementById('ratingBar');
  bar.classList.add('show');
  bar.querySelectorAll('.rating-btn').forEach((btn, i) => {
    btn.classList.toggle('suggested', (i + 1) === suggested);
  });
}

function hideRatingBar() {
  const bar = document.getElementById('ratingBar');
  if (!bar) return;
  bar.classList.remove('show');
  bar.querySelectorAll('.rating-btn').forEach(b => b.classList.remove('suggested'));
}

function rateCard(rating) {
  if (!currentQ || !srsData) return;
  const key = srsGetKey(currentQ);
  if (!srsData.items[key]) srsData.items[key] = { c: 0, w: 0, s: 0, ts: 0 };
  const entry = srsData.items[key];
  const wasNew = !entry.fsrs;
  entry.fsrs = FSRS.review(entry.fsrs, rating);
  if (wasNew) srsData.session.newDone++;
  if (!srsData.fsrs) srsData.fsrs = { totalRated: 0, goodRated: 0 };
  srsData.fsrs.totalRated++;
  if (rating >= 2) srsData.fsrs.goodRated++;
  srsSave();
  updateStats();
  nextQuestion();
}

function updateStats() {
  document.getElementById('todayCount').textContent = stats.total;
  document.getElementById('streak').textContent = stats.streak;
  if (srsData) {
    const learned = Object.values(srsData.items).filter(e => e.c > 0).length;
    document.getElementById('learnedCount').textContent = learned;

    // Due / new counts based on current mode's pool
    let pool = [];
    if (mode === 'qa') pool = getFilteredQA();
    else if (mode === 'weak') pool = VOCAB_CLEAN.filter(v => {
      const e = srsData.items[srsGetKey(v)];
      return e && e.w > 0;
    });
    else pool = getFilteredVocab();
    const { due, newLeft } = countDueAndNew(pool);
    document.getElementById('dueCount').textContent = due;
    document.getElementById('newCount').textContent = newLeft;

    // Retention from FSRS ratings (Hard/Good/Easy vs Again)
    const fs = srsData.fsrs || { totalRated: 0, goodRated: 0 };
    document.getElementById('retention').textContent = fs.totalRated > 0
      ? Math.round(fs.goodRated / fs.totalRated * 100) + '%' : '-';

    srsData.session.total = stats.total;
    srsData.session.correct = stats.correct;
    srsData.session.streak = stats.streak;
    srsSave();
  }
}

function updateProgress() {
  const pct = Math.min(stats.total / 20 * 100, 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

// ========== VOCAB BROWSER ==========
function renderVocabList() {
  const search = normalize(document.getElementById('vocabSearch').value);
  const filtered = VOCAB_CLEAN.filter(v => {
    if (level !== 'all' && v.level !== level) return false;
    if (!search) return true;
    return normalize(v.kanji).includes(search) ||
           normalize(v.reading).includes(search) ||
           normalize(v.zh).includes(search);
  });
  document.getElementById('vocabCount').textContent = `共 ${filtered.length} 個單字`;
  const html = filtered.map(v => {
    let dotClass = 'dot-gray';
    if (srsData) {
      const entry = srsData.items[srsGetKey(v)];
      if (entry) {
        if (entry.w > entry.c) dotClass = 'dot-red';
        else if (entry.s >= 3) dotClass = 'dot-green';
        else dotClass = 'dot-yellow';
      }
    }
    return `
    <div class="vocab-item">
      <div>
        <span class="mastery-dot ${dotClass}"></span>
        <span class="jp">${v.kanji}</span>
        <span class="reading">${v.reading}</span>
      </div>
      <div>
        <span class="zh">${v.zh}</span>
        <span class="lvl">${v.level}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('vocabList').innerHTML = html;
}

function filterVocab() { renderVocabList(); }

// ========== KEYBOARD ==========
document.getElementById('answerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (answered) nextQuestion();
    else checkAnswer();
  }
});

// ========== FILE PICKER HANDLER ==========
function handleFileSelect() {
  const vocabFile = document.getElementById('vocabFile').files[0];
  const qaFile = document.getElementById('qaFile').files[0];
  if (vocabFile && qaFile) {
    Promise.all([vocabFile.text(), qaFile.text()]).then(([vt, qt]) => {
      loadFromFiles(vt, qt);
    });
  }
}

// ========== INIT ==========
(async () => {
  try {
    await loadFromFetch();
    dataLoaded = true;
    srsLoad();
    updateStats();
    nextQuestion();
  } catch (e) {
    // fetch failed (likely file:// protocol), show file picker
    showFilePicker();
  }
})();
</script>
